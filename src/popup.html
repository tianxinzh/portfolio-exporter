<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup">
    <div class="pe-header">
      <img src="../icons/icon32.png" width="22" height="22" alt="" />
      <h1>Portfolio Exporter</h1>
    </div>
    <div class="pe-body">
      <div id="empty" class="hint" style="display:none"></div>
      <div id="dash">
        <div class="pe-label">Total value</div>
        <div class="pe-total" id="total">—</div>
        <div class="pe-rows" id="rows"></div>
        <div class="seg" id="seg">
          <button type="button" data-f="csv">CSV</button>
          <button type="button" data-f="json">JSON</button>
          <button type="button" data-f="yaml">YAML</button>
        </div>
        <button class="btn" id="download" disabled>Download holdings</button>
      </div>
      <div id="status" class="pe-status"></div>
      <button class="link" id="options" type="button">⚙ Settings</button>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
