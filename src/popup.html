<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px system-ui, sans-serif; width: 300px; padding: 12px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      #counts { margin: 6px 0; color: #222; }
      #status { margin: 6px 0; color: #a00; min-height: 1em; }
      .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
      select, button { font-size: 13px; padding: 6px; }
      button { flex: 1; }
      a { font-size: 12px; color: #06c; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Portfolio Exporter</h1>
    <div id="counts">Loading…</div>
    <div id="status"></div>
    <div class="row">
      <label for="format">Format</label>
      <select id="format">
        <option value="csv">CSV</option>
        <option value="json">JSON</option>
        <option value="yaml">YAML</option>
      </select>
    </div>
    <div class="row">
      <button id="download" disabled>Download holdings</button>
    </div>
    <a id="options">Settings (presets, filters, account)…</a>
    <script type="module" src="popup.js"></script>
  </body>
</html>
